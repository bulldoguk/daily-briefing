name: "Daily Briefing"
version: "0.1.0"
slug: "daily_briefing"
description: "Per-person daily briefing (calendar, occasions, todos) surfaced as HA sensors"
url: "https://github.com/bulldoguk/daily-briefing"
arch:
  - aarch64
  - amd64
init: false

options:
  ha_url: "http://homeassistant.local:8123"
  ha_token: ""
  todo_entity: "todo.tablet_tasks"
  refresh_time: "04:45"
  people:
    - name: "gary"
      calendar_entity: "calendar.gary_myhmbiz_com"
      sensor_entity: "sensor.daily_briefing_gary"

schema:
  ha_url: str
  ha_token: password
  todo_entity: str
  refresh_time: match(^[0-2][0-9]:[0-5][0-9]$)
  people:
    - name: str
      calendar_entity: str
      sensor_entity: str

map:
  - share:rw
